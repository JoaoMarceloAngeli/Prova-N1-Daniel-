<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador de Tarefas - MVC</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f5;
            color: #333;
            padding: 30px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.8rem;
            color: #222;
        }

        .subtitulo {
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 25px;
        }

        #form-tarefa {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        #input-descricao {
            flex: 1;
            padding: 10px 12px;
            font-size: 0.95rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        #input-descricao:focus {
            border-color: #4a90e2;
        }

        #form-tarefa button {
            padding: 10px 18px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        #form-tarefa button:hover {
            background-color: #357abd;
        }

        #contador-info {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 12px;
        }

        #lista-tarefas {
            list-style: none;
        }

        .tarefa-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
        }

        .tarefa-item:last-child {
            border-bottom: none;
        }

        .tarefa-item.concluida .tarefa-texto {
            text-decoration: line-through;
            color: #aaa;
        }

        .check-concluida {
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .tarefa-texto {
            flex: 1;
            font-size: 0.95rem;
        }

        .acoes {
            display: flex;
            gap: 6px;
        }

        .btn-editar,
        .btn-remover {
            padding: 5px 10px;
            font-size: 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-editar {
            background-color: #f0a500;
            color: white;
        }

        .btn-editar:hover {
            background-color: #d4900a;
        }

        .btn-remover {
            background-color: #e74c3c;
            color: white;
        }

        .btn-remover:hover {
            background-color: #c0392b;
        }

        .vazio {
            text-align: center;
            padding: 20px;
            color: #aaa;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gerenciador de Tarefas</h1>
        <p class="subtitulo">Arquitetura MVC com localStorage</p>

        <form id="form-tarefa">
            <input
                type="text"
                id="input-descricao"
                placeholder="Digite uma nova tarefa..."
                autocomplete="off"
            />
            <button type="submit">Adicionar</button>
        </form>

        <p id="contador-info"></p>

        <ul id="lista-tarefas"></ul>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmQb8HPqBH9XqKWFo78+Wt4RTBZB" crossorigin="anonymous"></script>
    <script type="module" src="./main.mjs"></script>
</body>
</html>
